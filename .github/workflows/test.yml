name: Test Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Build-Test:
    name: Demo Build-Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["1.25", "1.26"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.version }}

      - name: Run Build
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean

      - name: Run test
        run: go test -v
