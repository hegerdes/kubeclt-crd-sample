version: 2

# Helper
# goreleaser build --snapshot --clean
# goreleaser release --clean

project_name: kubectl-crd-sample

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: kubectl-crd-sample
    main: .
    binary: kubectl-crd_sample
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - kubectl-crd-sample
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  format: "{{ .Commit.ShortHash }}: {{ .Message }} ({{ .AuthorUsername }})"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## kubectl-crd-sample v{{ .Version }}

    Install by downloading the archive for your OS/arch below, extracting the
    `kubectl-crd_sample` binary, and placing it somewhere on your `$PATH`.
    `kubectl` will then discover it as the `crd-sample` subcommand.
